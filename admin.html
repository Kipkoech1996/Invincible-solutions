<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin — Registrations</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ink: #0a0a0f;
      --paper: #f5f2eb;
      --accent: #e8521a;
      --muted: #9a9490;
      --border: #d8d4cc;
    }

    body {
      background: var(--paper);
      color: var(--ink);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      min-height: 100vh;
    }

    header {
      background: var(--ink);
      color: var(--paper);
      padding: 1.2rem 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .brand { font-family: 'Bebas Neue', sans-serif; font-size: 1.6rem; letter-spacing: .06em; color: var(--accent); }
    .header-title { font-size: .75rem; letter-spacing: .12em; text-transform: uppercase; color: rgba(255,255,255,.4); }

    .back-link {
      font-size: .75rem;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: rgba(255,255,255,.5);
      text-decoration: none;
      border: 1px solid rgba(255,255,255,.15);
      padding: .3rem .7rem;
      border-radius: 2px;
      transition: color .2s;
    }
    .back-link:hover { color: #fff; }

    main { padding: 2rem; max-width: 1200px; margin: 0 auto; }

    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 1rem;
      margin-bottom: 2rem;
    }

    .stat-card {
      background: #fff;
      border: 1.5px solid var(--border);
      border-radius: 2px;
      padding: 1.2rem;
    }

    .stat-label { font-size: .7rem; letter-spacing: .1em; text-transform: uppercase; color: var(--muted); margin-bottom: .3rem; }
    .stat-value { font-family: 'Bebas Neue', sans-serif; font-size: 2.2rem; letter-spacing: .03em; color: var(--ink); }

    .toolbar {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-bottom: 1rem;
      flex-wrap: wrap;
    }

    .toolbar h2 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.4rem;
      letter-spacing: .04em;
      flex: 1;
    }

    .btn-refresh, .btn-export {
      padding: .45rem .9rem;
      border-radius: 2px;
      font-family: 'DM Sans', sans-serif;
      font-size: .78rem;
      font-weight: 500;
      cursor: pointer;
      letter-spacing: .04em;
      transition: .2s;
    }

    .btn-refresh { background: transparent; border: 1.5px solid var(--border); color: var(--ink); }
    .btn-refresh:hover { border-color: var(--ink); }

    .btn-export { background: var(--accent); border: none; color: #fff; }
    .btn-export:hover { background: #c9421a; }

    .search-input {
      padding: .45rem .8rem;
      border: 1.5px solid var(--border);
      border-radius: 2px;
      font-family: 'DM Sans', sans-serif;
      font-size: .85rem;
      width: 220px;
      outline: none;
    }
    .search-input:focus { border-color: var(--accent); }

    /* TABLE */
    .table-wrap {
      background: #fff;
      border: 1.5px solid var(--border);
      border-radius: 2px;
      overflow: hidden;
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    thead th {
      background: var(--ink);
      color: rgba(255,255,255,.7);
      font-size: .65rem;
      letter-spacing: .12em;
      text-transform: uppercase;
      font-weight: 500;
      padding: .75rem 1rem;
      text-align: left;
      white-space: nowrap;
      cursor: pointer;
      user-select: none;
    }

    thead th:hover { color: #fff; }
    thead th.sort-asc::after  { content: ' ↑'; color: var(--accent); }
    thead th.sort-desc::after { content: ' ↓'; color: var(--accent); }

    tbody tr {
      border-bottom: 1px solid var(--border);
      transition: background .15s;
    }

    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: #faf8f4; }

    tbody td {
      padding: .75rem 1rem;
      font-size: .85rem;
      color: var(--ink);
      white-space: nowrap;
    }

    .badge {
      display: inline-block;
      padding: .15rem .55rem;
      border-radius: 2px;
      font-size: .68rem;
      font-weight: 500;
      letter-spacing: .06em;
      text-transform: uppercase;
    }

    .badge-developer { background: #dbeafe; color: #1e40af; }
    .badge-designer  { background: #fce7f3; color: #9d174d; }
    .badge-product   { background: #d1fae5; color: #065f46; }
    .badge-founder   { background: #fef3c7; color: #92400e; }
    .badge-marketer  { background: #ede9fe; color: #4c1d95; }
    .badge-student   { background: #e0f2fe; color: #0c4a6e; }
    .badge-other     { background: #f3f4f6; color: #374151; }

    .delete-btn {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--muted);
      font-size: 1rem;
      padding: .2rem .4rem;
      border-radius: 2px;
      transition: color .2s, background .2s;
    }
    .delete-btn:hover { color: #dc2626; background: #fee2e2; }

    .empty-state {
      text-align: center;
      padding: 4rem 2rem;
      color: var(--muted);
    }

    .empty-state h3 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.8rem;
      letter-spacing: .04em;
      margin-bottom: .5rem;
      color: var(--border);
    }

    .loading { text-align: center; padding: 3rem; color: var(--muted); font-size: .9rem; }
  </style>
</head>
<body>

<header>
  <div>
    <div class="brand">Vortex</div>
    <div class="header-title">Admin Dashboard</div>
  </div>
  <a href="/" class="back-link">← Registration Page</a>
</header>

<main>
  <div class="stats" id="statsRow">
    <div class="stat-card">
      <div class="stat-label">Total Registrations</div>
      <div class="stat-value" id="statTotal">—</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Today</div>
      <div class="stat-value" id="statToday">—</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Newsletter Opt-in</div>
      <div class="stat-value" id="statNewsletter">—</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Top Role</div>
      <div class="stat-value" id="statTopRole">—</div>
    </div>
  </div>

  <div class="toolbar">
    <h2>Registrations</h2>
    <input class="search-input" id="searchInput" type="search" placeholder="Search name, email…" />
    <button class="btn-refresh" id="refreshBtn">↻ Refresh</button>
    <button class="btn-export" id="exportBtn">Export CSV</button>
  </div>

  <div class="table-wrap">
    <div class="loading" id="loadingMsg">Loading registrations…</div>
    <table id="regTable" style="display:none">
      <thead>
        <tr>
          <th data-col="firstName">First Name</th>
          <th data-col="lastName">Last Name</th>
          <th data-col="email">Email</th>
          <th data-col="phone">Phone</th>
          <th data-col="role">Role</th>
          <th data-col="newsletter">Newsletter</th>
          <th data-col="registeredAt">Registered</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="regBody"></tbody>
    </table>
    <div class="empty-state" id="emptyState" style="display:none">
      <h3>No Registrations Yet</h3>
      <p>Once people sign up, they'll appear here.</p>
    </div>
  </div>
</main>

<script>
  let allUsers = [];
  let sortCol  = 'registeredAt';
  let sortDir  = 'desc';

  async function loadUsers() {
    document.getElementById('loadingMsg').style.display = 'block';
    document.getElementById('regTable').style.display   = 'none';
    document.getElementById('emptyState').style.display = 'none';

    try {
      const res  = await fetch('/.netlify/functions/list-users');
      const data = await res.json();
      allUsers   = data.users || [];
      updateStats(allUsers);
      renderTable(allUsers);
    } catch (e) {
      document.getElementById('loadingMsg').textContent = 'Failed to load data.';
    }
  }

  function updateStats(users) {
    document.getElementById('statTotal').textContent = users.length;

    const today = new Date().toDateString();
    const todayCount = users.filter(u => new Date(u.registeredAt).toDateString() === today).length;
    document.getElementById('statToday').textContent = todayCount;

    const nlCount = users.filter(u => u.newsletter).length;
    document.getElementById('statNewsletter').textContent = nlCount;

    const roles = {};
    users.forEach(u => { roles[u.role] = (roles[u.role] || 0) + 1; });
    const top = Object.entries(roles).sort((a,b) => b[1]-a[1])[0];
    document.getElementById('statTopRole').textContent = top ? top[0] : '—';
  }

  function renderTable(users) {
    document.getElementById('loadingMsg').style.display = 'none';

    const q = document.getElementById('searchInput').value.toLowerCase();
    let filtered = users.filter(u =>
      [u.firstName, u.lastName, u.email, u.phone, u.role].join(' ').toLowerCase().includes(q)
    );

    filtered.sort((a, b) => {
      let av = a[sortCol] ?? '', bv = b[sortCol] ?? '';
      if (sortDir === 'asc') return String(av).localeCompare(String(bv));
      return String(bv).localeCompare(String(av));
    });

    if (filtered.length === 0) {
      document.getElementById('regTable').style.display   = 'none';
      document.getElementById('emptyState').style.display = 'block';
      return;
    }

    document.getElementById('emptyState').style.display = 'none';
    document.getElementById('regTable').style.display   = 'table';

    const body = document.getElementById('regBody');
    body.innerHTML = filtered.map(u => `
      <tr>
        <td>${esc(u.firstName)}</td>
        <td>${esc(u.lastName)}</td>
        <td>${esc(u.email)}</td>
        <td>${esc(u.phone || '—')}</td>
        <td><span class="badge badge-${u.role}">${esc(u.role)}</span></td>
        <td>${u.newsletter ? '✓' : '—'}</td>
        <td>${new Date(u.registeredAt).toLocaleDateString('en-GB', { day:'numeric', month:'short', year:'numeric', hour:'2-digit', minute:'2-digit' })}</td>
        <td><button class="delete-btn" onclick="deleteUser('${esc(u.id)}')" title="Delete">✕</button></td>
      </tr>
    `).join('');

    // Update sort indicators
    document.querySelectorAll('thead th[data-col]').forEach(th => {
      th.classList.remove('sort-asc', 'sort-desc');
      if (th.dataset.col === sortCol) th.classList.add(sortDir === 'asc' ? 'sort-asc' : 'sort-desc');
    });
  }

  function esc(str) {
    return String(str ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  async function deleteUser(id) {
    if (!confirm('Delete this registration?')) return;
    await fetch(`/.netlify/functions/delete-user?id=${encodeURIComponent(id)}`, { method: 'DELETE' });
    allUsers = allUsers.filter(u => u.id !== id);
    updateStats(allUsers);
    renderTable(allUsers);
  }

  // Sort
  document.querySelectorAll('thead th[data-col]').forEach(th => {
    th.addEventListener('click', () => {
      if (sortCol === th.dataset.col) sortDir = sortDir === 'asc' ? 'desc' : 'asc';
      else { sortCol = th.dataset.col; sortDir = 'asc'; }
      renderTable(allUsers);
    });
  });

  // Search
  document.getElementById('searchInput').addEventListener('input', () => renderTable(allUsers));

  // Refresh
  document.getElementById('refreshBtn').addEventListener('click', loadUsers);

  // Export CSV
  document.getElementById('exportBtn').addEventListener('click', () => {
    const headers = ['First Name','Last Name','Email','Phone','Role','Newsletter','Registered'];
    const rows = allUsers.map(u => [
      u.firstName, u.lastName, u.email, u.phone || '', u.role,
      u.newsletter ? 'Yes' : 'No',
      new Date(u.registeredAt).toISOString()
    ].map(v => `"${String(v).replace(/"/g,'""')}"`).join(','));

    const csv  = [headers.join(','), ...rows].join('\n');
    const blob = new Blob([csv], { type: 'text/csv' });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    a.href     = url;
    a.download = `registrations-${new Date().toISOString().slice(0,10)}.csv`;
    a.click();
  });

  loadUsers();
</script>
</body>
</html>
